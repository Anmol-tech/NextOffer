spring.application.name=${SPRING_APPLICATION_NAME:NextOffer}

# Database — values from repo-root .env (see ../.env.example)
spring.config.import=optional:file:../.env[.properties],optional:file:.env[.properties]

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT (override in .env — secret must be at least 32 characters)
app.jwt.secret=${JWT_SECRET:change-me-use-a-long-random-secret-at-least-32-chars}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Company watch observer (default 15 minutes between polls)
app.watch.poll-interval-ms=${WATCH_POLL_INTERVAL_MS:900000}
