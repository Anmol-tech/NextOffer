spring.application.name=${SPRING_APPLICATION_NAME:NextOffer}

# Render and other PaaS hosts set PORT; default 8080 for local dev
server.port=${PORT:8080}

# Database — values from repo-root .env (see ../.env.example)
spring.config.import=optional:file:../.env[.properties],optional:file:.env[.properties]

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Comma-separated frontend origins (set APP_CORS_ORIGINS on Render when FE is deployed)
app.cors.allowed-origins=${APP_CORS_ORIGINS:http://localhost:5173}

# JWT (override in .env — secret must be at least 32 characters)
app.jwt.secret=${JWT_SECRET:change-me-use-a-long-random-secret-at-least-32-chars}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Company watch observer (default 15 minutes between polls)
app.watch.poll-interval-ms=${WATCH_POLL_INTERVAL_MS:900000}

# LLM resume tailoring (optional — rule-based fallback when no API key is set)
# Provider: auto (prefers OpenRouter), openrouter, or openai
app.llm.provider=${LLM_PROVIDER:auto}

# OpenRouter — https://openrouter.ai (free Nemotron models use :free suffix)
app.openrouter.api-key=${OPENROUTER_API_KEY:}
app.openrouter.model=${OPENROUTER_MODEL:nvidia/nemotron-3-nano-30b-a3b:free}
app.openrouter.base-url=${OPENROUTER_BASE_URL:https://openrouter.ai/api}

# OpenAI (optional fallback)
app.openai.api-key=${OPENAI_API_KEY:}
app.openai.model=${OPENAI_MODEL:gpt-4o-mini}

# Resume file storage
app.resume.storage-path=${APP_RESUME_STORAGE_PATH:storage/resumes}
app.resume.compile-pdf=${APP_RESUME_COMPILE_PDF:true}
app.resume.latex-review=${APP_RESUME_LATEX_REVIEW:true}
